version: '3'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181
  broker:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
      - 29092:29092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  broker-init:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - broker
    command: >
      bash -c "
        echo 'Czekam na uruchomienie brokera...' &&
        sleep 15 &&
        kafka-topics --bootstrap-server broker:9092 --create --if-not-exists --topic vehicle_telemetry --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server broker:9092 --create --if-not-exists --topic fleet_alerts --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server broker:9092 --list
      "

  spark:
    image: jupyter/pyspark-notebook:latest
    user: root
    ports:
      - "8999:8888"
      - "4040:4040"
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
      - JUPYTER_TOKEN=root
    depends_on:
      - broker